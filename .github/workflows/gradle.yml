# This workflow will build an Android APK for AndroRAT
# Compatible with Android 16 (API 36) and all versions down to Android 5.0 (API 21)

name: Build Android APK (Android 16 Compatible)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Grant execute permission for gradlew
      run: chmod +x Android_Code/gradlew
    
    - name: Build Release APK with Gradle
      run: |
        cd Android_Code
        ./gradlew assembleRelease -x lint
    
    - name: Verify APK was built
      run: |
        if [ -f "Android_Code/app/build/outputs/apk/release/app-release.apk" ]; then
          echo "✅ APK built successfully!"
          ls -lh Android_Code/app/build/outputs/apk/release/app-release.apk
        else
          echo "❌ APK build failed!"
          exit 1
        fi
    
    - name: Check APK Compatibility
      run: |
        # Check target SDK using aapt
        if command -v aapt &> /dev/null; then
          echo "Target SDK Info:"
          aapt dump badging Android_Code/app/build/outputs/apk/release/app-release.apk | grep -i "sdk\|target\|min"
        fi
    
    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: androrat-apk
        path: Android_Code/app/build/outputs/apk/release/app-release.apk
    
    - name: Create Release and Upload APK
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: Android_Code/app/build/outputs/apk/release/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
